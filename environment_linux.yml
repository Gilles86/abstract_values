name: abstract_values
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - ipykernel
  - ipywidgets
  - pingouin
  # Neuroimaging
  - nibabel
  - nilearn
  - nipype
  - pip:
      # Keras 3 + multi-backend ML
      - tensorflow==2.20.0
      - tensorflow-probability[tf]==0.25.0
      - jax[cuda12]           # GPU-accelerated JAX on cluster (CUDA 12)
      - torch                 # PyTorch (CPU; add torch+cu121 for GPU)
      - keras==3.13.2
      # Braincoder (keras-backend branch)
      - git+https://github.com/Gilles86/braincoder.git@keras-backend
      # fMRI analysis
      - git+https://github.com/cvnlab/GLMsingle.git
      - pybids
      - pymc
      - tqdm
      - -e .
